<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Court Planner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f0; color: #1a1a18; }
  #app { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .sub { font-size: 14px; color: #666; margin-bottom: 16px; }
  .search-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-row input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
  .search-row input:focus { border-color: #378add; box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }
  .search-row button { padding: 8px 16px; border: 1px solid #ccc; border-radius: 8px; background: white; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .search-row button:hover { background: #f0f0ee; }
  .search-row button:disabled { opacity: 0.5; cursor: not-allowed; }
  #map-wrap { position: relative; width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; background: #e8e8e4; user-select: none; }
  #map-wrap.dragging { cursor: grabbing; }
  #map-wrap.draggable { cursor: grab; }
  #map { width: 100%; height: 500px; }
  #overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
  .placeholder { display: flex; align-items: center; justify-content: center; height: 500px; flex-direction: column; gap: 12px; color: #999; }
  .placeholder svg { width: 48px; height: 48px; opacity: 0.4; }
  .placeholder p { font-size: 14px; }
  .controls { background: white; border: 1px solid #ddd; border-radius: 12px; padding: 16px; margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .ctrl { display: flex; flex-direction: column; gap: 6px; }
  .ctrl label { font-size: 13px; color: #555; display: flex; justify-content: space-between; }
  .ctrl label span { font-weight: 500; color: #1a1a18; }
  .ctrl select, .ctrl input[type=range] { width: 100%; }
  .ctrl select { padding: 6px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; background: white; }
  .ctrl-full { grid-column: 1 / -1; }
  .info { grid-column: 1 / -1; display: flex; gap: 8px; flex-wrap: wrap; padding-top: 4px; border-top: 1px solid #eee; align-items: center; }
  .badge { font-size: 12px; padding: 3px 10px; border-radius: 6px; background: #e6f1fb; color: #185fa5; }
  .badge.tip { background: #faeeda; color: #854f0b; }
  .badge.marker-legend { background: #fbe9e9; color: #a02020; }
  .lock-btn { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px; background: white; font-size: 13px; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
  .lock-btn:hover { background: #f0f0ee; }
  .lock-btn.locked { background: #fbe9e9; border-color: #d98c8c; color: #a02020; font-weight: 500; }
  .attr { position: absolute; bottom: 6px; right: 8px; font-size: 11px; color: rgba(255,255,255,0.8); background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; pointer-events: none; }
  .hint { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 12px; color: rgba(255,255,255,0.9); background: rgba(0,0,0,0.45); padding: 4px 12px; border-radius: 20px; pointer-events: none; white-space: nowrap; transition: opacity 0.4s; }
</style>
</head>
<body>
<div id="app">
  <h1>Pickleball court planner</h1>
  <p class="sub">Search an address, then drag the map to position. Use controls to rotate and resize.</p>
  <div class="search-row">
    <input type="text" id="addr" placeholder="123 Main St, Anytown, CA" />
    <button id="go-btn" onclick="loadMap()">Search</button>
  </div>
  <div id="map-wrap">
    <div class="placeholder" id="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>
      <p>Enter an address above to get started</p>
    </div>
    <div id="map" style="display:none;"></div>
    <canvas id="overlay" style="display:none;"></canvas>
    <div class="attr" id="attr" style="display:none;">© Esri, Maxar, Earthstar Geographics</div>
    <div class="hint" id="hint" style="display:none;">Drag to pan map</div>
  </div>
  <div class="controls">
    <div class="ctrl">
      <label>Court layout</label>
      <select id="court-type" onchange="redraw()">
        <option value="standard">Standard — 44' × 20'</option>
        <option value="rec">Rec w/ buffers — 64' × 40'</option>
      </select>
    </div>
    <div class="ctrl">
      <label>Zoom <span id="zoom-val">19</span></label>
      <input type="range" id="zoom" min="17" max="21" step="1" value="19" oninput="onZoom(this.value)" />
    </div>
    <div class="ctrl ctrl-full">
      <label>Rotation <span id="rot-val">0°</span></label>
      <input type="range" id="rot" min="0" max="359" step="1" value="0" oninput="redraw()" />
    </div>
    <div class="ctrl ctrl-full">
      <label>Court opacity <span id="opacity-val">75%</span></label>
      <input type="range" id="opacity" min="20" max="100" step="5" value="75" oninput="redraw()" />
    </div>
    <div class="ctrl-full">
      <button id="lock-btn" class="lock-btn" onclick="toggleLock()">🔓 Lock court to map</button>
    </div>
    <div class="info">
      <span class="badge" id="dims-badge">Standard — 44' × 20'</span>
      <span class="badge tip">Drag the map to pan · Zoom 19–20 works best</span>
      <span class="badge marker-legend">📍 marks the searched address</span>
    </div>
  </div>
</div>

<script>
let lat = null, lng = null, zoom = 19;
// mapOffset tracks how many pixels the map has been dragged from its initial center
let mapOffsetX = 0, mapOffsetY = 0;
// courtOffset tracks how far the court has moved from screen-center.
// Stays at 0,0 when unlocked (court fixed on screen); moves with the map when locked.
let courtOffsetX = 0, courtOffsetY = 0;
let locked = false;
let isDragging = false, dragStartX = 0, dragStartY = 0, dragStartOffX = 0, dragStartOffY = 0;
let mapCanvas = null, mctx = null;
let lastTileParams = null;

function buildCourtCanvas(scale, withBuffers) {
  const COURT_L = 44, COURT_W = 20, KITCHEN = 7;
  const BUF_END = 10, BUF_SIDE = 10;
  const totalL = withBuffers ? COURT_L + BUF_END * 2 : COURT_L;
  const totalW = withBuffers ? COURT_W + BUF_SIDE * 2 : COURT_W;
  const W = Math.round(totalW * scale);
  const H = Math.round(totalL * scale);
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  const p = ft => ft * scale;

  if (withBuffers) {
    ctx.fillStyle = '#6aaa6a';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([p(1.5), p(1)]);
    ctx.strokeRect(0.75, 0.75, W - 1.5, H - 1.5);
    ctx.setLineDash([]);
  }

  const ox = withBuffers ? p(BUF_SIDE) : 0;
  const oy = withBuffers ? p(BUF_END) : 0;
  const cW = p(COURT_W), cH = p(COURT_L);
  const netY = oy + p(COURT_L / 2);          // net at 22' from each baseline
  const kitchenTop = netY - p(KITCHEN);       // NVZ line: 7' above net (15' from top baseline)
  const kitchenBot = netY + p(KITCHEN);       // NVZ line: 7' below net (15' from bottom baseline)
  const midX = ox + p(COURT_W / 2);

  // Base: fill entire court blue (service area color)
  ctx.fillStyle = '#3a7fd4';
  ctx.fillRect(ox, oy, cW, cH);

  // Service area halves — alternating shades left/right
  ctx.fillStyle = '#2d6bbf';
  ctx.fillRect(ox,    oy, p(COURT_W / 2), p(COURT_L / 2));      // top-left service
  ctx.fillRect(midX,  netY, p(COURT_W / 2), p(COURT_L / 2));    // bottom-right service
  ctx.fillStyle = '#4a8fd6';
  ctx.fillRect(midX,  oy, p(COURT_W / 2), p(COURT_L / 2));      // top-right service
  ctx.fillRect(ox,    netY, p(COURT_W / 2), p(COURT_L / 2));    // bottom-left service

  // Kitchen (NVZ) zones — red, 7' from net on each side, full width
  ctx.fillStyle = '#c94040';
  ctx.fillRect(ox, kitchenTop, cW, p(KITCHEN));   // top kitchen (between kitchenTop and netY)
  ctx.fillRect(ox, netY, cW, p(KITCHEN));          // bottom kitchen (between netY and kitchenBot)

  const lw = Math.max(1.5, scale * 0.15);
  ctx.strokeStyle = 'white';
  ctx.lineWidth = lw;
  ctx.lineJoin = 'miter';
  ctx.setLineDash([]);
  ctx.strokeRect(ox + lw/2, oy + lw/2, cW - lw, cH - lw);
  // NVZ lines (kitchen boundaries)
  ctx.beginPath(); ctx.moveTo(ox, kitchenTop); ctx.lineTo(ox + cW, kitchenTop); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox, kitchenBot); ctx.lineTo(ox + cW, kitchenBot); ctx.stroke();
  // Centerline runs through service areas only (baseline to kitchen line)
  ctx.beginPath(); ctx.moveTo(midX, oy); ctx.lineTo(midX, kitchenTop); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(midX, kitchenBot); ctx.lineTo(midX, oy + cH); ctx.stroke();

  ctx.strokeStyle = '#888';
  ctx.lineWidth = Math.max(2, scale * 0.25);
  ctx.beginPath(); ctx.moveTo(ox, netY); ctx.lineTo(ox + cW, netY); ctx.stroke();
  const postR = Math.max(2.5, scale * 0.3);
  ctx.fillStyle = '#aaa';
  ctx.beginPath(); ctx.arc(ox, netY, postR, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ox + cW, netY, postR, 0, Math.PI*2); ctx.fill();
  return c;
}

function metersPerPx(lat, z) {
  return (156543.03392 * Math.cos(lat * Math.PI / 180)) / Math.pow(2, z);
}
function latLngToTile(lat, lng, z) {
  return {
    x: Math.floor((lng + 180) / 360 * Math.pow(2, z)),
    y: Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, z))
  };
}
function tileTopLeft(tx, ty, z) {
  const n = Math.pow(2, z);
  return {
    lat: Math.atan(Math.sinh(Math.PI * (1 - 2 * ty / n))) * 180 / Math.PI,
    lng: tx / n * 360 - 180
  };
}

async function loadMap() {
  const addr = document.getElementById('addr').value.trim();
  if (!addr) return;
  const btn = document.getElementById('go-btn');
  btn.textContent = 'Loading…';
  btn.disabled = true;
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}&limit=1`, { headers: { 'Accept-Language': 'en' } });
    const d = await r.json();
    if (!d.length) { alert('Address not found — try a more specific address.'); return; }
    lat = parseFloat(d[0].lat);
    lng = parseFloat(d[0].lon);
    zoom = parseInt(document.getElementById('zoom').value);
    mapOffsetX = 0;
    mapOffsetY = 0;
    courtOffsetX = 0;
    courtOffsetY = 0;
    renderTiles();
    const hint = document.getElementById('hint');
    hint.style.display = 'block';
    hint.style.opacity = '1';
    setTimeout(() => { hint.style.opacity = '0'; setTimeout(() => { hint.style.display = 'none'; }, 400); }, 3000);
  } catch(e) {
    alert('Geocoding failed. Check your internet connection.');
  } finally {
    btn.textContent = 'Search';
    btn.disabled = false;
  }
}

function renderTiles() {
  if (lat === null) return;
  const wrap = document.getElementById('map-wrap');
  const mapDiv = document.getElementById('map');
  const overlayCanvas = document.getElementById('overlay');
  const W = wrap.offsetWidth;
  const H = 500;

  document.getElementById('placeholder').style.display = 'none';
  mapDiv.style.display = 'block';
  overlayCanvas.style.display = 'block';
  document.getElementById('attr').style.display = 'block';
  wrap.classList.add('draggable');

  mapDiv.style.width = W + 'px';
  mapDiv.style.height = H + 'px';
  overlayCanvas.width = W;
  overlayCanvas.height = H;
  overlayCanvas.style.width = W + 'px';
  overlayCanvas.style.height = H + 'px';

  mapDiv.innerHTML = '';
  mapCanvas = document.createElement('canvas');
  mapCanvas.width = W; mapCanvas.height = H;
  mapCanvas.style.cssText = `width:${W}px;height:${H}px;display:block;`;
  mapDiv.appendChild(mapCanvas);
  mctx = mapCanvas.getContext('2d');

  const TS = 256;
  const ct = latLngToTile(lat, lng, zoom);
  const tl = tileTopLeft(ct.x, ct.y, zoom);
  const tlNext = tileTopLeft(ct.x + 1, ct.y + 1, zoom);
  const lngPerTile = tlNext.lng - tl.lng;
  const latPerTile = tl.lat - tlNext.lat;
  const pxOffX = ((lng - tl.lng) / lngPerTile) * TS;
  const pxOffY = ((tl.lat - lat) / latPerTile) * TS;

  // Use extra tiles so panning doesn't show blank edges
  const nx = Math.ceil(W / TS) + 5;
  const ny = Math.ceil(H / TS) + 5;
  const stx = ct.x - Math.floor(nx / 2);
  const sty = ct.y - Math.floor(ny / 2);

  lastTileParams = { TS, nx, ny, stx, sty, originX: W / 2 - pxOffX - Math.floor(nx / 2) * TS, originY: H / 2 - pxOffY - Math.floor(ny / 2) * TS };

  let done = 0, total = nx * ny;
  for (let tx = 0; tx < nx; tx++) {
    for (let ty = 0; ty < ny; ty++) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      const px = Math.round(lastTileParams.originX + tx * TS);
      const py = Math.round(lastTileParams.originY + ty * TS);
      img.onload = () => { mctx.drawImage(img, px, py, TS, TS); done++; if (done === total) { applyMapOffset(); redraw(); } };
      img.onerror = () => { done++; if (done === total) { applyMapOffset(); redraw(); } };
      img.src = `https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${zoom}/${sty+ty}/${stx+tx}`;
    }
  }

  window._meta = { W, H, mpp: metersPerPx(lat, zoom) };
  redraw();
}

// Re-draw the tile layer shifted by mapOffset, then redraw the court overlay
function applyMapOffset() {
  if (!mctx || !lastTileParams) return;
  const { W, H } = window._meta;
  const { TS, nx, ny, stx, sty, originX, originY } = lastTileParams;
  mctx.clearRect(0, 0, W, H);
  // re-stamp tiles — we keep them in an offscreen buffer per tile
  // Since tiles are already loaded we just redraw from the img cache via re-fetch (they're browser-cached)
  for (let tx = 0; tx < nx; tx++) {
    for (let ty = 0; ty < ny; ty++) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      const px = Math.round(originX + tx * TS + mapOffsetX);
      const py = Math.round(originY + ty * TS + mapOffsetY);
      img.onload = () => { mctx.drawImage(img, px, py, TS, TS); redraw(); };
      img.src = `https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${zoom}/${sty+ty}/${stx+tx}`;
    }
  }
}

function redraw() {
  const meta = window._meta;
  if (!meta) return;
  const { W, H, mpp } = meta;
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const type = document.getElementById('court-type').value;
  const withBuffers = type === 'rec';
  const rot = parseInt(document.getElementById('rot').value);
  const opacity = parseInt(document.getElementById('opacity').value) / 100;

  document.getElementById('rot-val').textContent = rot + '°';
  document.getElementById('opacity-val').textContent = Math.round(opacity * 100) + '%';
  document.getElementById('dims-badge').textContent = withBuffers ? "Rec w/ buffers — 64' × 40'" : "Standard — 44' × 20'";

  const FTM = 0.3048;
  const totalL_ft = withBuffers ? 64 : 44;
  const totalW_ft = withBuffers ? 40 : 20;
  const drawW = (totalW_ft * FTM) / mpp;
  const drawH = (totalL_ft * FTM) / mpp;

  const courtC = buildCourtCanvas(10, withBuffers);

  // Court position: fixed at screen-center when unlocked, or follows the map pan when locked
  const cx = W / 2 + courtOffsetX;
  const cy = H / 2 + courtOffsetY;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot * Math.PI / 180);
  ctx.globalAlpha = opacity;
  ctx.drawImage(courtC, -drawW / 2, -drawH / 2, drawW, drawH);
  ctx.globalAlpha = 1;
  ctx.restore();

  // Draw a marker pin at the original searched address.
  // The address is always at the original map center, so its screen position
  // is just the map's pan offset relative to viewport center.
  const markerX = W / 2 + mapOffsetX;
  const markerY = H / 2 + mapOffsetY;
  drawMarker(ctx, markerX, markerY);
}

function drawMarker(ctx, x, y) {
  ctx.save();
  ctx.translate(x, y);
  // Pin shadow
  ctx.beginPath();
  ctx.ellipse(0, 2, 5, 2.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fill();
  // Pin body (teardrop)
  ctx.beginPath();
  ctx.arc(0, -14, 8, 0, Math.PI * 2);
  ctx.fillStyle = '#e03131';
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-6, -9);
  ctx.lineTo(0, 1);
  ctx.lineTo(6, -9);
  ctx.closePath();
  ctx.fillStyle = '#e03131';
  ctx.fill();
  // White outline
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = 'white';
  ctx.beginPath();
  ctx.arc(0, -14, 8, 0, Math.PI * 2);
  ctx.stroke();
  // Inner dot
  ctx.beginPath();
  ctx.arc(0, -14, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'white';
  ctx.fill();
  ctx.restore();
}

function toggleLock() {
  locked = !locked;
  const btn = document.getElementById('lock-btn');
  if (locked) {
    // Snap court offset to current map offset so it doesn't jump
    courtOffsetX = mapOffsetX;
    courtOffsetY = mapOffsetY;
    btn.textContent = '🔒 Court locked to map';
    btn.classList.add('locked');
  } else {
    btn.textContent = '🔓 Lock court to map';
    btn.classList.remove('locked');
  }
  redraw();
}

function onZoom(z) {
  if (lat === null) {
    zoom = parseInt(z);
    document.getElementById('zoom-val').textContent = z;
    return;
  }
  // Figure out what ground location is currently under the court (screen center),
  // accounting for how far the map has been dragged, BEFORE changing zoom.
  const mpp = metersPerPx(lat, zoom);
  const metersPerDegLat = 111320;
  const metersPerDegLng = 111320 * Math.cos(lat * Math.PI / 180);

  // Dragging the map right (positive mapOffsetX) shifts content right, meaning the
  // ground point now at screen-center used to sit to the LEFT (west) of center.
  //   -> newLng = lng - (mapOffsetX * mpp) / metersPerDegLng
  // Dragging the map down (positive mapOffsetY) shifts content down, meaning the
  // ground point now at screen-center used to sit ABOVE (north, higher lat) of center.
  //   -> newLat = lat + (mapOffsetY * mpp) / metersPerDegLat
  const newLng = lng - (mapOffsetX * mpp) / metersPerDegLng;
  const newLat = lat + (mapOffsetY * mpp) / metersPerDegLat;

  lat = newLat;
  lng = newLng;

  const oldZoom = zoom;
  zoom = parseInt(z);
  document.getElementById('zoom-val').textContent = z;

  // Rescale the court's pixel offset (if locked) to match the new zoom level,
  // so the court stays over the same ground location rather than the same screen position.
  if (locked) {
    const scaleFactor = Math.pow(2, zoom - oldZoom);
    courtOffsetX = courtOffsetX * scaleFactor;
    courtOffsetY = courtOffsetY * scaleFactor;
  }

  mapOffsetX = 0;
  mapOffsetY = 0;
  renderTiles();
}

// --- Drag to pan ---
const wrap = document.getElementById('map-wrap');

wrap.addEventListener('mousedown', e => {
  if (lat === null) return;
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragStartOffX = mapOffsetX;
  dragStartOffY = mapOffsetY;
  wrap.classList.add('dragging');
  e.preventDefault();
});

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  mapOffsetX = dragStartOffX + (e.clientX - dragStartX);
  mapOffsetY = dragStartOffY + (e.clientY - dragStartY);
  if (locked) {
    courtOffsetX = mapOffsetX;
    courtOffsetY = mapOffsetY;
  }
  applyMapOffset();
  redraw();
});

window.addEventListener('mouseup', () => {
  isDragging = false;
  wrap.classList.remove('dragging');
});

// Touch support
wrap.addEventListener('touchstart', e => {
  if (lat === null || e.touches.length !== 1) return;
  isDragging = true;
  dragStartX = e.touches[0].clientX;
  dragStartY = e.touches[0].clientY;
  dragStartOffX = mapOffsetX;
  dragStartOffY = mapOffsetY;
  e.preventDefault();
}, { passive: false });

window.addEventListener('touchmove', e => {
  if (!isDragging || e.touches.length !== 1) return;
  mapOffsetX = dragStartOffX + (e.touches[0].clientX - dragStartX);
  mapOffsetY = dragStartOffY + (e.touches[0].clientY - dragStartY);
  if (locked) {
    courtOffsetX = mapOffsetX;
    courtOffsetY = mapOffsetY;
  }
  applyMapOffset();
  redraw();
  e.preventDefault();
}, { passive: false });

window.addEventListener('touchend', () => { isDragging = false; });

document.getElementById('addr').addEventListener('keydown', e => { if (e.key === 'Enter') loadMap(); });
</script>
</body>
</html>
