<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Court Planner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f0; color: #1a1a18; }
  #app { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .sub { font-size: 14px; color: #666; margin-bottom: 16px; }
  .search-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-row input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
  .search-row input:focus { border-color: #378add; box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }
  .search-row button { padding: 8px 16px; border: 1px solid #ccc; border-radius: 8px; background: white; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .search-row button:hover { background: #f0f0ee; }
  .search-row button:disabled { opacity: 0.5; cursor: not-allowed; }
  #map-wrap { position: relative; width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; background: #e8e8e4; user-select: none; }
  #map-wrap.dragging { cursor: grabbing; }
  #map-wrap.draggable { cursor: grab; }
  #map { width: 100%; height: 500px; }
  .placeholder { display: flex; align-items: center; justify-content: center; height: 500px; flex-direction: column; gap: 12px; color: #999; }
  .placeholder svg { width: 48px; height: 48px; opacity: 0.4; }
  .placeholder p { font-size: 14px; }
  .controls { background: white; border: 1px solid #ddd; border-radius: 12px; padding: 16px; margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .ctrl { display: flex; flex-direction: column; gap: 6px; }
  .ctrl label { font-size: 13px; color: #555; display: flex; justify-content: space-between; }
  .ctrl label span { font-weight: 500; color: #1a1a18; }
  .ctrl select, .ctrl input[type=range] { width: 100%; }
  .ctrl select { padding: 6px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; background: white; }
  .ctrl-full { grid-column: 1 / -1; }
  .info { grid-column: 1 / -1; display: flex; gap: 8px; flex-wrap: wrap; padding-top: 4px; border-top: 1px solid #eee; align-items: center; }
  .badge { font-size: 12px; padding: 3px 10px; border-radius: 6px; background: #e6f1fb; color: #185fa5; }
  .badge.tip { background: #faeeda; color: #854f0b; }
  .badge.marker-legend { background: #fbe9e9; color: #a02020; }
  .lock-btn { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px; background: white; font-size: 13px; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
  .lock-btn:hover { background: #f0f0ee; }
  .lock-btn.locked { background: #fbe9e9; border-color: #d98c8c; color: #a02020; font-weight: 500; }
  .attr { position: absolute; bottom: 6px; right: 8px; font-size: 11px; color: rgba(255,255,255,0.8); background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; pointer-events: none; }
  .hint { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 12px; color: rgba(255,255,255,0.9); background: rgba(0,0,0,0.45); padding: 4px 12px; border-radius: 20px; pointer-events: none; white-space: nowrap; transition: opacity 0.4s; }
  .share-row { display: flex; gap: 8px; margin-top: 12px; }
  .share-row input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; background: #f9f9f7; color: #555; }
  .share-row button { padding: 8px 16px; border: 1px solid #ccc; border-radius: 8px; background: white; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .share-row button:hover { background: #f0f0ee; }
  .share-row button.copied { background: #e6f7ec; border-color: #8fd6a8; color: #1a7a3e; }
</style>
</head>
<body>
<div id="app">
  <h1>Pickleball court planner</h1>
  <p class="sub">Search an address, then drag the map to position. Use controls to rotate and resize.</p>
  <div class="search-row">
    <input type="text" id="addr" placeholder="123 Main St, Anytown, CA" />
    <button id="go-btn" onclick="loadMap()">Search</button>
  </div>
  <div id="map-wrap">
    <div class="placeholder" id="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>
      <p>Enter an address above to get started</p>
    </div>
    <div id="map" style="display:none;"></div>
    <div class="attr" id="attr" style="display:none;">© Esri, Maxar, Earthstar Geographics</div>
    <div class="hint" id="hint" style="display:none;">Drag to pan map</div>
  </div>
  <div class="controls">
    <div class="ctrl">
      <label>Court layout</label>
      <select id="court-type" onchange="onCourtTypeChange()">
        <option value="standard">Standard — 44' × 20'</option>
        <option value="rec">Rec w/ buffers — 64' × 40'</option>
      </select>
    </div>
    <div class="ctrl">
      <label>Zoom <span id="zoom-val">19</span></label>
      <input type="range" id="zoom" min="17" max="21" step="1" value="19" oninput="onZoom(this.value)" />
    </div>
    <div class="ctrl ctrl-full">
      <label>Rotation <span id="rot-val">0°</span></label>
      <input type="range" id="rot" min="0" max="359" step="1" value="0" oninput="onRotation(this.value)" />
    </div>
    <div class="ctrl ctrl-full">
      <label>Court opacity <span id="opacity-val">75%</span></label>
      <input type="range" id="opacity" min="20" max="100" step="5" value="75" oninput="onOpacity(this.value)" />
    </div>
    <div class="ctrl-full">
      <button id="lock-btn" class="lock-btn" onclick="toggleLock()">🔓 Lock court to map</button>
    </div>
    <div class="info">
      <span class="badge" id="dims-badge">Standard — 44' × 20'</span>
      <span class="badge tip">Drag the map to pan · Zoom 19–20 works best</span>
      <span class="badge marker-legend">📍 marks the searched address</span>
    </div>
  </div>
  <div class="share-row" id="share-row" style="display:none;">
    <input type="text" id="share-url" readonly />
    <button id="share-btn" onclick="copyShareLink()">Copy link</button>
  </div>
</div>

<script>
// ============================================================================
// STATE MODEL — everything lives in real-world units (lat/lng, degrees,
// percentages) rather than screen pixels, so the entire state maps 1:1 onto
// URL query parameters and survives reloads, sharing, and zoom changes
// without any pixel-rescaling math.
// ============================================================================

const state = {
  addrLat: null,    // the geocoded address — set once on search, never mutated
  addrLng: null,
  courtLat: null,   // the court's real-world center point
  courtLng: null,
  zoom: 19,
  rotation: 0,      // degrees
  opacity: 75,      // percent
  courtType: 'standard', // 'standard' | 'rec'
  locked: false,     // if true, the court is locked to the ground (courtLat/Lng moves with no extra logic needed — see below)
  addrText: ''       // for display in the search box
};

// mapCenterLat/Lng is PURELY a rendering concern: which ground point is at the
// center of the viewport right now. It changes as you drag (pan) the map.
// It is NOT part of the shareable state — it's always derived as addrLat/Lng
// plus whatever pan offset is currently active, and resets to courtLat/Lng-ish
// view on load. We track it directly here for simplicity during a session.
let mapCenterLat = null, mapCenterLng = null;

let isDragging = false, dragStartX = 0, dragStartY = 0;
let dragStartCenterLat = 0, dragStartCenterLng = 0;
let mctx = null;

function metersPerPx(lat, z) {
  return (156543.03392 * Math.cos(lat * Math.PI / 180)) / Math.pow(2, z);
}
const METERS_PER_DEG_LAT = 111320;
function metersPerDegLng(lat) { return 111320 * Math.cos(lat * Math.PI / 180); }

// Convert a real lat/lng point into a pixel offset from the CURRENT map center.
function latLngToScreenOffset(pLat, pLng) {
  const mpp = metersPerPx(mapCenterLat, state.zoom);
  const dx = (pLng - mapCenterLng) * metersPerDegLng(mapCenterLat);
  const dy = (mapCenterLat - pLat) * METERS_PER_DEG_LAT; // screen-y grows downward as lat decreases
  return { x: dx / mpp, y: dy / mpp };
}

// Convert a pixel offset from the current map center back into a real lat/lng.
function screenOffsetToLatLng(dxPx, dyPx) {
  const mpp = metersPerPx(mapCenterLat, state.zoom);
  const dxMeters = dxPx * mpp;
  const dyMeters = dyPx * mpp;
  const newLng = mapCenterLng + dxMeters / metersPerDegLng(mapCenterLat);
  const newLat = mapCenterLat - dyMeters / METERS_PER_DEG_LAT;
  return { lat: newLat, lng: newLng };
}

// ============================================================================
// URL STATE SYNC
// ============================================================================

function encodeStateToURL() {
  const p = new URLSearchParams();
  if (state.addrLat !== null) {
    p.set('lat', state.addrLat.toFixed(7));
    p.set('lng', state.addrLng.toFixed(7));
  }
  if (state.courtLat !== null) {
    p.set('clat', state.courtLat.toFixed(7));
    p.set('clng', state.courtLng.toFixed(7));
  }
  p.set('zoom', state.zoom);
  p.set('rot', state.rotation);
  p.set('op', state.opacity);
  p.set('type', state.courtType);
  p.set('locked', state.locked ? '1' : '0');
  if (state.addrText) p.set('addr', state.addrText);
  return p.toString();
}

function updateURL() {
  const qs = encodeStateToURL();
  const newUrl = `${window.location.pathname}?${qs}`;
  window.history.replaceState(null, '', newUrl);
  updateShareBox();
}

function updateShareBox() {
  if (state.addrLat === null) return;
  document.getElementById('share-row').style.display = 'flex';
  document.getElementById('share-url').value = window.location.href;
}

function loadStateFromURL() {
  const p = new URLSearchParams(window.location.search);
  if (!p.has('lat') || !p.has('lng')) return false;
  state.addrLat = parseFloat(p.get('lat'));
  state.addrLng = parseFloat(p.get('lng'));
  state.courtLat = p.has('clat') ? parseFloat(p.get('clat')) : state.addrLat;
  state.courtLng = p.has('clng') ? parseFloat(p.get('clng')) : state.addrLng;
  state.zoom = p.has('zoom') ? parseInt(p.get('zoom')) : 19;
  state.rotation = p.has('rot') ? parseInt(p.get('rot')) : 0;
  state.opacity = p.has('op') ? parseInt(p.get('op')) : 75;
  state.courtType = p.has('type') ? p.get('type') : 'standard';
  state.locked = p.get('locked') === '1';
  state.addrText = p.has('addr') ? p.get('addr') : '';
  return true;
}

function copyShareLink() {
  const input = document.getElementById('share-url');
  input.select();
  navigator.clipboard.writeText(input.value).then(() => {
    const btn = document.getElementById('share-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy link'; btn.classList.remove('copied'); }, 1800);
  }).catch(() => {
    input.focus();
  });
}

// ============================================================================
// COURT RENDERING (unchanged geometry logic)
// ============================================================================

function buildCourtCanvas(scale, withBuffers) {
  const COURT_L = 44, COURT_W = 20, KITCHEN = 7;
  const BUF_END = 10, BUF_SIDE = 10;
  const totalL = withBuffers ? COURT_L + BUF_END * 2 : COURT_L;
  const totalW = withBuffers ? COURT_W + BUF_SIDE * 2 : COURT_W;
  const W = Math.round(totalW * scale);
  const H = Math.round(totalL * scale);
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  const p = ft => ft * scale;

  if (withBuffers) {
    ctx.fillStyle = '#6aaa6a';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([p(1.5), p(1)]);
    ctx.strokeRect(0.75, 0.75, W - 1.5, H - 1.5);
    ctx.setLineDash([]);
  }

  const ox = withBuffers ? p(BUF_SIDE) : 0;
  const oy = withBuffers ? p(BUF_END) : 0;
  const cW = p(COURT_W), cH = p(COURT_L);
  const netY = oy + p(COURT_L / 2);
  const kitchenTop = netY - p(KITCHEN);
  const kitchenBot = netY + p(KITCHEN);
  const midX = ox + p(COURT_W / 2);

  ctx.fillStyle = '#3a7fd4';
  ctx.fillRect(ox, oy, cW, cH);
  ctx.fillStyle = '#2d6bbf';
  ctx.fillRect(ox,    oy, p(COURT_W / 2), p(COURT_L / 2));
  ctx.fillRect(midX,  netY, p(COURT_W / 2), p(COURT_L / 2));
  ctx.fillStyle = '#4a8fd6';
  ctx.fillRect(midX,  oy, p(COURT_W / 2), p(COURT_L / 2));
  ctx.fillRect(ox,    netY, p(COURT_W / 2), p(COURT_L / 2));

  ctx.fillStyle = '#c94040';
  ctx.fillRect(ox, kitchenTop, cW, p(KITCHEN));
  ctx.fillRect(ox, netY, cW, p(KITCHEN));

  const lw = Math.max(1.5, scale * 0.15);
  ctx.strokeStyle = 'white';
  ctx.lineWidth = lw;
  ctx.lineJoin = 'miter';
  ctx.setLineDash([]);
  ctx.strokeRect(ox + lw/2, oy + lw/2, cW - lw, cH - lw);
  ctx.beginPath(); ctx.moveTo(ox, kitchenTop); ctx.lineTo(ox + cW, kitchenTop); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox, kitchenBot); ctx.lineTo(ox + cW, kitchenBot); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(midX, oy); ctx.lineTo(midX, kitchenTop); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(midX, kitchenBot); ctx.lineTo(midX, oy + cH); ctx.stroke();

  ctx.strokeStyle = '#888';
  ctx.lineWidth = Math.max(2, scale * 0.25);
  ctx.beginPath(); ctx.moveTo(ox, netY); ctx.lineTo(ox + cW, netY); ctx.stroke();
  const postR = Math.max(2.5, scale * 0.3);
  ctx.fillStyle = '#aaa';
  ctx.beginPath(); ctx.arc(ox, netY, postR, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ox + cW, netY, postR, 0, Math.PI*2); ctx.fill();
  return c;
}

function drawMarker(ctx, x, y) {
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath();
  ctx.ellipse(0, 2, 5, 2.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, -14, 8, 0, Math.PI * 2);
  ctx.fillStyle = '#e03131';
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-6, -9);
  ctx.lineTo(0, 1);
  ctx.lineTo(6, -9);
  ctx.closePath();
  ctx.fillStyle = '#e03131';
  ctx.fill();
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = 'white';
  ctx.beginPath();
  ctx.arc(0, -14, 8, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, -14, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'white';
  ctx.fill();
  ctx.restore();
}

// ============================================================================
// TILE / MAP RENDERING
// ============================================================================

function latLngToTile(lat, lng, z) {
  return {
    x: Math.floor((lng + 180) / 360 * Math.pow(2, z)),
    y: Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, z))
  };
}
function tileTopLeft(tx, ty, z) {
  const n = Math.pow(2, z);
  return {
    lat: Math.atan(Math.sinh(Math.PI * (1 - 2 * ty / n))) * 180 / Math.PI,
    lng: tx / n * 360 - 180
  };
}

async function loadMap() {
  const addr = document.getElementById('addr').value.trim();
  if (!addr) return;
  const btn = document.getElementById('go-btn');
  btn.textContent = 'Loading…';
  btn.disabled = true;
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}&limit=1`, { headers: { 'Accept-Language': 'en' } });
    const d = await r.json();
    if (!d.length) { alert('Address not found — try a more specific address.'); return; }
    state.addrLat = parseFloat(d[0].lat);
    state.addrLng = parseFloat(d[0].lon);
    state.addrText = addr;
    state.courtLat = state.addrLat;
    state.courtLng = state.addrLng;
    state.zoom = parseInt(document.getElementById('zoom').value);
    state.rotation = 0;
    state.opacity = 75;
    state.locked = false;
    setLockUI(false);
    mapCenterLat = state.addrLat;
    mapCenterLng = state.addrLng;
    renderTiles();
    updateURL();
    const hint = document.getElementById('hint');
    hint.style.display = 'block';
    hint.style.opacity = '1';
    setTimeout(() => { hint.style.opacity = '0'; setTimeout(() => { hint.style.display = 'none'; }, 400); }, 3000);
  } catch(e) {
    alert('Geocoding failed. Check your internet connection.');
  } finally {
    btn.textContent = 'Search';
    btn.disabled = false;
  }
}

let mapCanvasEl = null; // the persistent <canvas> holding both tiles and overlay, drawn fresh every frame

// Cache of loaded tile Image objects, keyed by "z/y/x", so we can redraw them
// at new screen positions on every frame without re-fetching from the network.
const tileImageCache = {};
let currentTileSet = null; // { zoom, stx, sty, nx, ny, TS } describing which tiles are currently cached/visible

function ensureTilesLoaded(onAnyNewTileLoaded) {
  if (state.addrLat === null) return;
  const wrap = document.getElementById('map-wrap');
  const W = wrap.offsetWidth, H = 500;
  const TS = 256;
  const ct = latLngToTile(mapCenterLat, mapCenterLng, state.zoom);

  // Load a generous margin of tiles around the current center so dragging
  // doesn't immediately reveal blank edges before the next reload.
  const nx = Math.ceil(W / TS) + 6;
  const ny = Math.ceil(H / TS) + 6;
  const stx = ct.x - Math.floor(nx / 2);
  const sty = ct.y - Math.floor(ny / 2);

  currentTileSet = { zoom: state.zoom, stx, sty, nx, ny, TS };

  for (let tx = 0; tx < nx; tx++) {
    for (let ty = 0; ty < ny; ty++) {
      const tileX = stx + tx, tileY = sty + ty;
      const key = `${state.zoom}/${tileY}/${tileX}`;
      if (tileImageCache[key]) continue; // already loaded or loading
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.loaded = false;
      tileImageCache[key] = img;
      img.onload = () => { img.loaded = true; if (onAnyNewTileLoaded) onAnyNewTileLoaded(); };
      img.onerror = () => { /* leave unloaded; redraw will just skip it */ };
      img.src = `https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${state.zoom}/${tileY}/${tileX}`;
    }
  }
}

// Draw all currently-cached tiles for the active tile set onto the map canvas,
// positioned fresh from the CURRENT mapCenterLat/Lng every call. This is the
// single source of truth for tile placement — no CSS transform involved.
function drawTiles(ctx, W, H) {
  if (!currentTileSet) return;
  const { zoom, stx, sty, nx, ny, TS } = currentTileSet;
  const ct = latLngToTile(mapCenterLat, mapCenterLng, zoom);
  const tl = tileTopLeft(ct.x, ct.y, zoom);
  const tlNext = tileTopLeft(ct.x + 1, ct.y + 1, zoom);
  const lngPerTile = tlNext.lng - tl.lng;
  const latPerTile = tl.lat - tlNext.lat;
  const pxOffX = ((mapCenterLng - tl.lng) / lngPerTile) * TS;
  const pxOffY = ((tl.lat - mapCenterLat) / latPerTile) * TS;
  const originX = W / 2 - pxOffX - (ct.x - stx) * TS;
  const originY = H / 2 - pxOffY - (ct.y - sty) * TS;

  for (let tx = 0; tx < nx; tx++) {
    for (let ty = 0; ty < ny; ty++) {
      const tileX = stx + tx, tileY = sty + ty;
      const key = `${zoom}/${tileY}/${tileX}`;
      const img = tileImageCache[key];
      if (!img || !img.loaded) continue;
      const px = Math.round(originX + tx * TS);
      const py = Math.round(originY + ty * TS);
      ctx.drawImage(img, px, py, TS, TS);
    }
  }
}

function renderTiles() {
  if (state.addrLat === null) return;
  const wrap = document.getElementById('map-wrap');
  const mapDiv = document.getElementById('map');
  const W = wrap.offsetWidth;
  const H = 500;

  document.getElementById('placeholder').style.display = 'none';
  mapDiv.style.display = 'block';
  document.getElementById('attr').style.display = 'block';
  wrap.classList.add('draggable');

  mapDiv.style.width = W + 'px';
  mapDiv.style.height = H + 'px';

  // Single persistent canvas used for BOTH tiles and the court/marker overlay,
  // so everything is drawn together in one coordinate space every frame —
  // no separate CSS-transformed layer that could drift out of sync.
  if (!mapCanvasEl) {
    mapDiv.innerHTML = '';
    mapCanvasEl = document.createElement('canvas');
    mapCanvasEl.style.cssText = `display:block;`;
    mapDiv.appendChild(mapCanvasEl);
    mctx = mapCanvasEl.getContext('2d');
  }
  mapCanvasEl.width = W; mapCanvasEl.height = H;
  mapCanvasEl.style.width = W + 'px';
  mapCanvasEl.style.height = H + 'px';

  ensureTilesLoaded(redraw);
  redraw();
}

function redraw() {
  if (state.addrLat === null || !mctx) return;
  const wrap = document.getElementById('map-wrap');
  const W = wrap.offsetWidth, H = 500;
  mctx.clearRect(0, 0, W, H);

  // 1. Tiles — drawn fresh every frame from the current mapCenterLat/Lng,
  //    using the exact same coordinate math as the court/marker below.
  drawTiles(mctx, W, H);

  document.getElementById('zoom-val').textContent = state.zoom;
  document.getElementById('rot-val').textContent = state.rotation + '°';
  document.getElementById('opacity-val').textContent = state.opacity + '%';
  const withBuffers = state.courtType === 'rec';
  document.getElementById('dims-badge').textContent = withBuffers ? "Rec w/ buffers — 64' × 40'" : "Standard — 44' × 20'";

  const mpp = metersPerPx(mapCenterLat, state.zoom);
  const FTM = 0.3048;
  const totalL_ft = withBuffers ? 64 : 44;
  const totalW_ft = withBuffers ? 40 : 20;
  const drawW = (totalW_ft * FTM) / mpp;
  const drawH = (totalL_ft * FTM) / mpp;

  const courtC = buildCourtCanvas(10, withBuffers);

  // 2. Court — position derives purely from its real lat/lng vs current map center
  const courtOffset = latLngToScreenOffset(state.courtLat, state.courtLng);
  const cx = W / 2 + courtOffset.x;
  const cy = H / 2 + courtOffset.y;

  mctx.save();
  mctx.translate(cx, cy);
  mctx.rotate(state.rotation * Math.PI / 180);
  mctx.globalAlpha = state.opacity / 100;
  mctx.drawImage(courtC, -drawW / 2, -drawH / 2, drawW, drawH);
  mctx.globalAlpha = 1;
  mctx.restore();

  // 3. Address marker — same coordinate math, drawn last so it's always on top
  const markerOffset = latLngToScreenOffset(state.addrLat, state.addrLng);
  drawMarker(mctx, W / 2 + markerOffset.x, H / 2 + markerOffset.y);
}

// ============================================================================
// CONTROL HANDLERS
// ============================================================================

function onCourtTypeChange() {
  state.courtType = document.getElementById('court-type').value;
  redraw();
  updateURL();
}

function onRotation(v) {
  state.rotation = parseInt(v);
  redraw();
  updateURL();
}

function onOpacity(v) {
  state.opacity = parseInt(v);
  redraw();
  updateURL();
}

function setLockUI(locked) {
  const btn = document.getElementById('lock-btn');
  if (locked) {
    btn.textContent = '🔒 Court locked to map';
    btn.classList.add('locked');
  } else {
    btn.textContent = '🔓 Lock court to map';
    btn.classList.remove('locked');
  }
}

function toggleLock() {
  state.locked = !state.locked;
  setLockUI(state.locked);
  updateURL();
}

function onZoom(z) {
  if (state.addrLat === null) {
    state.zoom = parseInt(z);
    document.getElementById('zoom-val').textContent = z;
    return;
  }
  state.zoom = parseInt(z);
  renderTiles();
  updateURL();
}

// ============================================================================
// DRAG TO PAN — dragging always moves the map's real-world center.
// If locked, the court's real lat/lng is shifted by the same real-world delta
// so it stays fixed in space relative to the ground (i.e. moves with the map).
// If unlocked, the court's lat/lng stays fixed while the map moves under it,
// which visually keeps the court pinned to screen-center automatically
// because redraw() always recomputes court screen position from courtLat/Lng
// relative to the CURRENT mapCenter — so as mapCenter moves toward courtLat/Lng's
// fixed point... wait: actually for "stays fixed on screen" we need the court's
// lat/lng to move WITH the map too when unlocked, by the same delta as the
// map center, so its on-screen offset from center stays constant relative to
// where it currently sits. This is handled explicitly below.
// ============================================================================

const wrap = document.getElementById('map-wrap');

wrap.addEventListener('mousedown', e => {
  if (state.addrLat === null) return;
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragStartCenterLat = mapCenterLat;
  dragStartCenterLng = mapCenterLng;
  wrap.classList.add('dragging');
  e.preventDefault();
});

function handleDragMove(clientX, clientY) {
  const dxPx = clientX - dragStartX;
  const dyPx = clientY - dragStartY;
  const mpp = metersPerPx(dragStartCenterLat, state.zoom);
  const dxMeters = -dxPx * mpp; // dragging right moves map content right == center point shifts left (west)
  const dyMeters = -dyPx * mpp;
  const newCenterLng = dragStartCenterLng + dxMeters / metersPerDegLng(dragStartCenterLat);
  const newCenterLat = dragStartCenterLat - dyMeters / METERS_PER_DEG_LAT;

  // If the court is locked to the map, move it by the same real-world delta
  // as the map center, so it stays fixed in space (drags along with the ground).
  if (state.locked) {
    const centerDeltaLat = newCenterLat - mapCenterLat;
    const centerDeltaLng = newCenterLng - mapCenterLng;
    state.courtLat += centerDeltaLat;
    state.courtLng += centerDeltaLng;
  } else {
    // Unlocked: the court should stay visually fixed at screen-center as the
    // map pans beneath it. Since redraw() positions the court based on
    // (courtLat,courtLng) relative to the NEW mapCenter, we need courtLat/Lng
    // to track mapCenter exactly so its screen offset remains (0,0).
    state.courtLat = newCenterLat;
    state.courtLng = newCenterLng;
  }

  mapCenterLat = newCenterLat;
  mapCenterLng = newCenterLng;

  // If we've panned far enough that we might be nearing the edge of the
  // currently-loaded tile set, queue up loading more tiles for the new area.
  // This is cheap to call repeatedly since ensureTilesLoaded skips tiles
  // that are already cached or in-flight.
  ensureTilesLoaded(redraw);
  redraw();
}

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  handleDragMove(e.clientX, e.clientY);
});

window.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    wrap.classList.remove('dragging');
    ensureTilesLoaded(redraw); // top off any tiles needed for the final position
    updateURL();
  }
});

wrap.addEventListener('touchstart', e => {
  if (state.addrLat === null || e.touches.length !== 1) return;
  isDragging = true;
  dragStartX = e.touches[0].clientX;
  dragStartY = e.touches[0].clientY;
  dragStartCenterLat = mapCenterLat;
  dragStartCenterLng = mapCenterLng;
  e.preventDefault();
}, { passive: false });

window.addEventListener('touchmove', e => {
  if (!isDragging || e.touches.length !== 1) return;
  handleDragMove(e.touches[0].clientX, e.touches[0].clientY);
  e.preventDefault();
}, { passive: false });

window.addEventListener('touchend', () => {
  if (isDragging) {
    isDragging = false;
    ensureTilesLoaded(redraw);
    updateURL();
  }
});

document.getElementById('addr').addEventListener('keydown', e => { if (e.key === 'Enter') loadMap(); });

// ============================================================================
// INITIAL LOAD — restore from URL if present
// ============================================================================

(function init() {
  if (loadStateFromURL()) {
    document.getElementById('addr').value = state.addrText || '';
    document.getElementById('zoom').value = state.zoom;
    document.getElementById('rot').value = state.rotation;
    document.getElementById('opacity').value = state.opacity;
    document.getElementById('court-type').value = state.courtType;
    setLockUI(state.locked);
    mapCenterLat = state.addrLat;
    mapCenterLng = state.addrLng;
    renderTiles();
    updateShareBox();
  }
})();
</script>
</body>
</html>
